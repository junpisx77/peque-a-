<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Love Forever ❤️</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

canvas{
display:block;
}

#inicio{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:10;
}

#btnEntrar{
padding:12px 20px;
background:red;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:20px;
font-size:16px;
}

/* 💌 mensaje final PRO abajo */
#mensajeFinal{
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%) scale(0.8);
text-align:center;
font-size:40px;
white-space:nowrap;
opacity:0;
pointer-events:none;

/* ✨ efecto neón */
color:white;
text-shadow:
0 0 5px #ff4da6,
0 0 10px #ff4da6,
0 0 20px #ff1a8c,
0 0 40px #ff1a8c;

/* animaciones */
animation: brillo 2s infinite alternate;
transition: opacity 1.5s, transform 1.5s;
}

@keyframes brillo{
from{
text-shadow:
0 0 5px #ff4da6,
0 0 10px #ff4da6;
}
to{
text-shadow:
0 0 20px #ff1a8c,
0 0 40px #ff1a8c,
0 0 60px #ff66b2;
}
}

</style>
</head>

<body>

<div id="inicio">
<h2>Tengo algo bonito para ti karlita ❤️</h2>
<button id="btnEntrar">Entrar</button>
</div>

<canvas id="canvas"></canvas>
<div id="mensajeFinal"></div>

<script>

const nombre = "Karlita";

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let hearts = [];
let particles = [];
let iniciar = false;
let latido = 0;
let tiempoExplosion = 0;
let explotando = false;
let mostrarFinal = false;

for(let i=0;i<120;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

for(let i=0;i<40;i++){
hearts.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
speed:1+Math.random()*2,
size:10+Math.random()*10
});
}

function drawStars(){
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
}

function drawFloatingHearts(){
ctx.fillStyle="red";
hearts.forEach(h=>{
ctx.font=h.size+"px Arial";
ctx.fillText("❤",h.x,h.y);

h.y-=h.speed;

if(h.y<0){
h.y=canvas.height;
h.x=Math.random()*canvas.width;
}
});
}

function heart(t){
let x = 16 * Math.pow(Math.sin(t),3);
let y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
return {x,y};
}

function crearExplosion(){
particles = [];
for(let i=0;i<300;i++){
particles.push({
x:canvas.width/2,
y:canvas.height/2,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,
life:100
});
}
}

function drawParticles(){
particles.forEach(p=>{
ctx.fillStyle="#ff4da6";
ctx.shadowColor="#ff4da6";
ctx.shadowBlur=10;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fill();

p.x += p.vx;
p.y += p.vy;
p.life--;
});
particles = particles.filter(p=>p.life>0);
}

let angle = 0;

function animate(){

if(!iniciar) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

drawStars();
drawFloatingHearts();

tiempoExplosion++;

if(tiempoExplosion > 300 && !explotando){
crearExplosion();
explotando = true;
}

if(explotando){
drawParticles();

if(particles.length === 0){
explotando = false;
tiempoExplosion = 0;

if(!mostrarFinal){
mostrarMensajeFinal();
mostrarFinal = true;
}
}
}else{

latido += 0.05;
let scaleBase = 15 + Math.sin(latido)*2;

for(let i=0;i<200;i++){
let t=i*0.1;
let p=heart(t);

let x = canvas.width/2 + (p.x*scaleBase*Math.cos(angle) - p.y*scaleBase*Math.sin(angle));
let y = canvas.height/2 + (p.x*scaleBase*Math.sin(angle) + p.y*scaleBase*Math.cos(angle));

ctx.fillStyle="white";
ctx.shadowColor="#ff4da6";
ctx.shadowBlur=20;

ctx.font="14px Arial";
ctx.fillText("Te quiero " + nombre, x, y);
}

angle+=0.01;
}

requestAnimationFrame(animate);
}

// 💌 mensaje final con zoom + neón
function mostrarMensajeFinal(){
let texto = "Quiero estar contigo a tu lado hasta donde tú me lo permitas ❤️";

let contenedor = document.getElementById("mensajeFinal");
contenedor.innerText = texto;

// aparecer con zoom
setTimeout(()=>{
contenedor.style.opacity = 1;
contenedor.style.transform = "translateX(-50%) scale(1)";
}, 100);
}

document.getElementById("btnEntrar").onclick=()=>{
document.getElementById("inicio").style.display="none";

iniciar = true;
animate();
};

</script>

</body>
</html>
